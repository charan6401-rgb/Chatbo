<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sri Charan's AI</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Syne:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
</head>

<body>

<div class="app-shell">

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      Sri Charan's AI
    </div>
    <button id="clear-btn">Clear</button>
  </header>

  <!-- CHAT -->
  <div class="chat-window">
    <div id="messages-area" class="messages-area">

      <div class="empty-state" id="empty-state">
        <h2>Sri Charan's AI</h2>
        <p>Ask anything — code, ideas, or tech 🚀</p>
      </div>

    </div>

    <!-- INPUT -->
    <div class="input-bar">
      <textarea id="user-input" placeholder="Type your message..."></textarea>
      <button id="send-btn">➤</button>
    </div>

  </div>

</div>

<script src="/static/script.js"></script>
</body>
</html>
