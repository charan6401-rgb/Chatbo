<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sri Charan · AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg1: #040d1a;
    --bg2: #071428;
    --cyan: #00e5ff;
    --teal: #00bcd4;
    --red:  #ff3c6e;
    --glass-bg: rgba(255,255,255,0.04);
    --glass-border: rgba(0,229,255,0.18);
    --glass-blur: blur(18px);
    --text: #e8f4f8;
    --muted: rgba(232,244,248,0.45);
    --font-head: 'Syne', sans-serif;
    --font-body: 'Space Grotesk', sans-serif;
    --radius: 20px;
    --radius-sm: 12px;
    --bubble-user: rgba(0,229,255,0.12);
    --bubble-bot: rgba(255,255,255,0.05);
  }

  html, body {
    height: 100%;
    font-family: var(--font-body);
    background: var(--bg1);
    color: var(--text);
    overflow: hidden;
  }

  .bg-canvas {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 15% 20%, rgba(0,188,212,0.18) 0%, transparent 65%),
      radial-gradient(ellipse 50% 60% at 85% 75%, rgba(255,60,110,0.14) 0%, transparent 65%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(0,229,255,0.07) 0%, transparent 70%),
      linear-gradient(160deg, #040d1a 0%, #071428 100%);
  }
  .bg-canvas::after {
    content:'';
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,229,255,0.04) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,229,255,0.04) 40px);
  }

  .app {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
  }

  .header {
    display: flex; align-items: center; gap: 12px;
    padding: 18px 20px 14px;
    background: rgba(4,13,26,0.55);
    backdrop-filter: blur(24px) saturate(160%);
    border-bottom: 1px solid var(--glass-border);
    flex-shrink: 0;
  }
  .avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, var(--cyan), var(--red));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-head); font-weight: 800; font-size: 16px;
    color: #fff; flex-shrink: 0;
    box-shadow: 0 0 16px rgba(0,229,255,0.35);
  }
  .header-info { flex: 1; }
  .header-name {
    font-family: var(--font-head); font-weight: 700; font-size: 17px;
    letter-spacing: 0.02em; color: var(--text);
  }
  .header-sub {
    font-size: 11px; color: var(--cyan); letter-spacing: 0.08em;
    text-transform: uppercase; margin-top: 2px;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #00e676;
    box-shadow: 0 0 8px #00e676;
    flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.5; transform:scale(0.8); }
  }

  .prompts-strip {
    display: flex; gap: 8px;
    padding: 12px 16px;
    overflow-x: auto; flex-shrink: 0;
    scrollbar-width: none;
  }
  .prompts-strip::-webkit-scrollbar { display: none; }
  .prompt-chip {
    white-space: nowrap;
    padding: 7px 14px;
    border-radius: 50px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: var(--glass-blur);
    font-size: 12px; color: var(--cyan);
    cursor: pointer; transition: all 0.22s;
    flex-shrink: 0;
    font-family: var(--font-body); font-weight: 500;
  }
  .prompt-chip:hover, .prompt-chip:active {
    background: rgba(0,229,255,0.12);
    border-color: var(--cyan);
    box-shadow: 0 0 14px rgba(0,229,255,0.2);
    transform: translateY(-1px);
  }

  .messages {
    flex: 1; overflow-y: auto;
    padding: 8px 16px 12px;
    display: flex; flex-direction: column; gap: 14px;
    scrollbar-width: thin;
    scrollbar-color: rgba(0,229,255,0.15) transparent;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.15); border-radius: 4px; }

  .msg { display: flex; flex-direction: column; max-width: 85%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot  { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.6; font-size: 14px;
    backdrop-filter: var(--glass-blur);
    border: 1px solid transparent;
    animation: popIn 0.28s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { opacity:0; transform:scale(0.88) translateY(6px); }
    to   { opacity:1; transform:scale(1) translateY(0); }
  }
  .msg.user .bubble {
    background: var(--bubble-user);
    border-color: rgba(0,229,255,0.22);
    border-bottom-right-radius: 6px;
    color: var(--text);
  }
  .msg.bot .bubble {
    background: var(--bubble-bot);
    border-color: rgba(255,255,255,0.08);
    border-bottom-left-radius: 6px;
    color: var(--text);
  }
  .msg-time {
    font-size: 10px; color: var(--muted);
    margin-top: 4px; padding: 0 4px;
  }

  .typing-bubble {
    background: var(--bubble-bot);
    border: 1px solid rgba(255,255,255,0.08);
    border-bottom-left-radius: 6px;
    border-radius: var(--radius);
    padding: 14px 18px;
    display: none; align-items: center; gap: 5px;
    backdrop-filter: var(--glass-blur);
  }
  .typing-bubble.visible { display: flex; }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--cyan); opacity:0.5; }
  .dot:nth-child(1) { animation: blink 1.2s 0s infinite; }
  .dot:nth-child(2) { animation: blink 1.2s 0.2s infinite; }
  .dot:nth-child(3) { animation: blink 1.2s 0.4s infinite; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  .input-area {
    flex-shrink: 0;
    padding: 12px 16px 20px;
    background: rgba(4,13,26,0.6);
    backdrop-filter: blur(24px) saturate(160%);
    border-top: 1px solid var(--glass-border);
  }
  .input-wrap {
    display: flex; align-items: flex-end; gap: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    padding: 10px 10px 10px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
    backdrop-filter: blur(12px);
  }
  .input-wrap:focus-within {
    border-color: rgba(0,229,255,0.45);
    box-shadow: 0 0 20px rgba(0,229,255,0.12);
  }
  #msgInput {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: var(--font-body); font-size: 14px;
    resize: none; line-height: 1.5;
    max-height: 100px; min-height: 22px;
    overflow-y: auto;
  }
  #msgInput::placeholder { color: var(--muted); }
  .send-btn {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, var(--cyan), var(--teal));
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.18s, box-shadow 0.18s;
    box-shadow: 0 0 16px rgba(0,229,255,0.25);
  }
  .send-btn:hover { transform: scale(1.08); box-shadow: 0 0 22px rgba(0,229,255,0.4); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { width:16px; height:16px; fill:#040d1a; }

  .welcome-card {
    margin: 16px 0 4px;
    padding: 18px 20px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    backdrop-filter: var(--glass-blur);
    font-size: 13.5px; line-height: 1.7; color: var(--muted);
  }
  .welcome-card strong { color: var(--cyan); font-weight: 600; }
  .welcome-card .tag {
    display: inline-block; padding: 2px 10px;
    background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.2);
    border-radius: 50px; font-size: 11px; color: var(--cyan);
    margin: 2px 3px 0 0; letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="bg-canvas"></div>

<div class="app">

  <header class="header">
    <div class="avatar">SC</div>
    <div class="header-info">
      <div class="header-name">Sri Charan</div>
      <div class="header-sub">AI · Portfolio Assistant</div>
    </div>
    <div class="status-dot"></div>
  </header>

  <div class="prompts-strip" id="promptsStrip">
    <button class="prompt-chip" onclick="sendPrompt('Who is Sri Charan?')">👤 Who is Sri Charan?</button>
    <button class="prompt-chip" onclick="sendPrompt('Tell me about his projects')">🚀 Projects</button>
    <button class="prompt-chip" onclick="sendPrompt('What are his skills?')">⚡ Skills</button>
    <button class="prompt-chip" onclick="sendPrompt('What is his educational background?')">🎓 Education</button>
    <button class="prompt-chip" onclick="sendPrompt('How can I contact Sri Charan?')">📬 Contact</button>
    <button class="prompt-chip" onclick="sendPrompt('What are his achievements?')">🏆 Achievements</button>
  </div>

  <div class="messages" id="messages">
    <div class="welcome-card">
      Hey there 👋 I'm <strong>Sri Charan's AI assistant</strong>.<br/>
      Ask me anything — his work, projects, skills, or background.<br/>
      <br/>
      <span class="tag">Full-Stack</span>
      <span class="tag">AI/ML</span>
      <span class="tag">Cloud</span>
      <span class="tag">Open Source</span>
    </div>
  </div>

  <div style="padding: 0 16px 8px; flex-shrink:0;">
    <div class="typing-bubble" id="typingBubble">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="msgInput" rows="1" placeholder="Ask about Sri Charan…"></textarea>
      <button class="send-btn" id="sendBtn" onclick="handleSend()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
  // ── Point this to your Flask backend ──────────────────────────────────────
  // If Flask and this HTML are on the same server/domain, use a relative path:
  const BACKEND_URL = "/chat";
  // If running locally (Flask on 5000, HTML opened separately), use:
  // const BACKEND_URL = "http://localhost:5000/chat";
  // After deploying to Render, use:
  // const BACKEND_URL = "https://your-app-name.onrender.com/chat";
  // ──────────────────────────────────────────────────────────────────────────

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('msgInput');
  const typingEl   = document.getElementById('typingBubble');
  const sendBtn    = document.getElementById('sendBtn');

  let conversationHistory = [];
  let isStreaming = false;

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function appendMessage(role, text) {
    const wrap   = document.createElement('div');
    wrap.className = `msg ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = getTime();

    wrap.appendChild(bubble);
    wrap.appendChild(time);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    return { wrap, bubble, time };
  }

  function showTyping(show) {
    typingEl.classList.toggle('visible', show);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
  }
  inputEl.addEventListener('input', autoResize);
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  });

  async function sendPrompt(text) {
    inputEl.value = text;
    autoResize();
    await handleSend();
  }

  async function handleSend() {
    if (isStreaming) return;
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    autoResize();
    isStreaming = true;
    sendBtn.style.opacity = '0.5';

    // Show user message
    appendMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });

    showTyping(true);

    let botNode  = null;
    let fullReply = '';

    try {
      // ── Call YOUR Flask /chat endpoint ──────────────────────────────────
      const response = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory })
        // The backend prepends the system prompt automatically,
        // so we only send the conversation history here.
      });

      if (!response.ok) {
        throw new Error(`Server error: ${response.status}`);
      }

      showTyping(false);
      botNode = appendMessage('bot', '');

      // ── Read the streamed plain-text response ───────────────────────────
      const reader  = response.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        fullReply += chunk;
        botNode.bubble.textContent = fullReply;
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
      // ────────────────────────────────────────────────────────────────────

      botNode.time.textContent = getTime();
      conversationHistory.push({ role: 'assistant', content: fullReply });

    } catch (err) {
      showTyping(false);
      if (!botNode) botNode = appendMessage('bot', '');
      botNode.bubble.textContent = '⚠️ Could not reach the server. Please try again.';
      botNode.bubble.style.color = '#ff6b8a';
      console.error('Chat error:', err);
    } finally {
      isStreaming = false;
      sendBtn.style.opacity = '1';
      inputEl.focus();
    }
  }
</script>
</body>
</html>
