<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sri Charan's AI</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="app">
    <div class="chat-container">

        <div class="header">
            Sri Charan's AI
        </div>

        <div id="messages"></div>

        <div class="quick-actions">
            <button onclick="quickAsk('Tell me about your projects')">Projects</button>
            <button onclick="quickAsk('What are your skills?')">Skills</button>
            <button onclick="quickAsk('Who are you?')">About</button>
        </div>

        <div class="input-box">
            <input id="input" placeholder="Ask about me..." />
            <button onclick="sendMessage()">Send</button>
            <button onclick="stopStream()">Stop</button>
        </div>

    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
