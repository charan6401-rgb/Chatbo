<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sri Charan AI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Syne:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">⚡ Jarvis</div>
    <button id="new-chat">+ New Chat</button>
    <div id="history"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <header class="topbar">Sri Charan's AI</header>

    <div id="messages" class="messages">
      <div class="empty">
        <h2>Jarvis Online ⚡</h2>
        <p>Say "Hey Jarvis" to activate</p>
      </div>
    </div>

    <!-- INPUT -->
    <div class="input-box">
      <textarea id="input" placeholder="Message Jarvis..."></textarea>
      <button id="mic">🎤</button>
      <button id="send">➤</button>
    </div>

  </main>
</div>

<script src="/static/script.js"></script>
</body>
</html>
