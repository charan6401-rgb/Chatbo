<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sri Charan AI Chat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="bg-canvas"></div>

    <div class="app">

        <!-- HEADER -->

        <header class="header">

            <div class="avatar">SC</div>

            <div class="header-info">
                <div class="header-name">
                    Sri Charan
                </div>

                <div class="header-sub">
                    AI · Portfolio Assistant
                </div>
            </div>

            <div class="status-dot"></div>

        </header>

        <!-- QUICK PROMPTS -->

        <div class="prompts-strip">

            <button class="prompt-chip"
                    onclick="sendPrompt('Who is Sri Charan?')">
                👤 Who is Sri Charan?
            </button>

            <button class="prompt-chip"
                    onclick="sendPrompt('Tell me about his projects')">
                🚀 Projects
            </button>

            <button class="prompt-chip"
                    onclick="sendPrompt('What are his skills?')">
                ⚡ Skills
            </button>

            <button class="prompt-chip"
                    onclick="sendPrompt('What is his educational background?')">
                🎓 Education
            </button>

            <button class="prompt-chip"
                    onclick="sendPrompt('How can I contact Sri Charan?')">
                📬 Contact
            </button>

            <button class="prompt-chip"
                    onclick="sendPrompt('What are his achievements?')">
                🏆 Achievements
            </button>

        </div>

        <!-- CHAT AREA -->

        <div class="messages" id="messages">

            <div class="welcome-card">

                <strong>
                    👋 Welcome to Sri Charan's AI Assistant
                </strong>

                <br><br>

                Ask me anything about:

                <br><br>

                • Projects<br>
                • Skills<br>
                • Education<br>
                • Achievements<br>
                • Contact Information<br>
                • Future Goals

                <br><br>

                <span class="tag">AI</span>
                <span class="tag">Full-Stack</span>
                <span class="tag">Python</span>
                <span class="tag">Web Dev</span>

            </div>

        </div>

        <!-- TYPING INDICATOR -->

        <div style="padding:0 16px 8px; flex-shrink:0;">

            <div class="typing-bubble"
                 id="typingBubble">

                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>

            </div>

        </div>

        <!-- INPUT AREA -->

        <div class="input-area">

            <div class="input-wrap">

                <textarea
                    id="msgInput"
                    rows="1"
                    placeholder="Ask about Sri Charan..."
                ></textarea>

                <button
                    class="send-btn"
                    id="sendBtn"
                    onclick="handleSend()">

                    <svg viewBox="0 0 24 24"
                         xmlns="http://www.w3.org/2000/svg">

                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>

                    </svg>

                </button>

            </div>

        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
